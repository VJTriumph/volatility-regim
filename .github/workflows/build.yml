name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas

      - name: Run dashboard script
        run: python nifty_vol_dashboard.py

      - name: Download Plotly JS (with retry)
        run: |
          curl -fsSL --retry 5 --retry-delay 3 --max-time 180 \
            "https://cdn.plot.ly/plotly-2.35.2.min.js" \
            -o plotly.min.js
          echo "Plotly JS size: $(wc -c < plotly.min.js) bytes"

      - name: Inline Plotly JS and fix resize
        run: |
          python - << 'PYEOF'
          js_text = open("plotly.min.js", encoding="utf-8").read()
          src = open("nifty_vol_dashboard.html", encoding="utf-8").read()

          cdn_tag = '<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>'
          inline_tag = '<script>' + js_text + '</script>'
          src = src.replace(cdn_tag, inline_tag, 1)

          old_str = 'renderNotice(rows);\n}'
          new_str = ('renderNotice(rows);\n'
                     "  ['c-dom','c-wom','c-wdn','c-meg','c-weg','c-vix']"
                     '.forEach(function(id){'
                     'try{Plotly.Plots.resize(document.getElementById(id));}catch(e){}});\n}')
          src = src.replace(old_str, new_str, 1)

          open("index.html", "w", encoding="utf-8").write(src)
          print("Done. index.html size:", len(src) // 1024, "KB")
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: index.html
          commit_message: 'chore: auto-deploy dashboard [skip ci]'
